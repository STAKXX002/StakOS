name: Build StakOS

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "README.md"
      - "docs/**"

  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - "README.md"
      - "docs/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          nasm \
          clang-format \
          genisoimage \
          grub-pc-bin \
          mtools \
          xorriso \
          qemu-system-i386

    - name: Cache i686-elf-gcc toolchain
      id: toolchain-cache
      uses: actions/cache@v4
      with:
        path: /home/linuxbrew/.linuxbrew
        key: ${{ runner.os }}-linuxbrew-i686-elf-gcc-v1

    - name: Install i686-elf toolchain via Homebrew
      if: steps.toolchain-cache.outputs.cache-hit != 'true'
      run: |
        eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
        brew install i686-elf-gcc

    - name: Add Homebrew to PATH
      run: echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH

    - name: Verify cross-compiler
      run: |
        eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
        i686-elf-gcc --version
        i686-elf-gcc -print-multi-os-directory || true

    - name: Check code formatting
      run: |
        find kernel shell mm drivers userland include \
          \( -name "*.c" -o -name "*.h" \) \
          -exec clang-format --dry-run --Werror {} +

    - name: Build bootable ISO
      run: make iso

    - name: Boot smoke test in QEMU
      run: |
        timeout --signal=KILL 30 qemu-system-i386 \
          -m 32M \
          -display none \
          -debugcon file:debug.log \
          -no-reboot \
          -boot d \
          -cdrom build/stakos.iso || true

        echo "----- QEMU debug console output -----"

        if [ -f debug.log ]; then
          cat debug.log
        else
          echo "debug.log was never created — QEMU likely failed to start"
          exit 1
        fi

        grep -q "STAKOS_BOOT_OK" debug.log

    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: stakos-iso
        path: build/stakos.iso

    - name: Upload debug log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: debug-log
        path: debug.log