name: Build StakOS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 1. Install nasm and the ISO generation tools your Makefile expects
    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm genisoimage grub-pc-bin mtools xorriso

    # 2. Get the special i686-elf-gcc compiler
    - name: Set up i686-elf toolchain
      uses: lowenware/setup-i686-elf-gcc@v1
      with:
        version: '13.2.0'

    # 3. Run your specific compilation commands
    - name: Compile kernel
      run: make

    - name: Build bootable ISO
      run: make iso
