name: Build StakOS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm genisoimage grub-pc-bin mtools xorriso

    - name: Install i686-elf toolchain via Homebrew
      run: |
        eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
        brew install i686-elf-gcc
        echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH

    - name: Compile kernel
      run: make

    - name: Build bootable ISO
      run: make iso
